<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Desert Vault - Power Grid</title>
    
    <link rel="stylesheet" href="shared.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        .hud {
            display: flex; justify-content: space-between;
            font-size: 18px; font-weight: bold;
            border-bottom: 1px dashed var(--primary);
            padding-bottom: 15px; margin-bottom: 20px;
        }

        #grid-instructions {
            margin-bottom: 30px; font-style: italic; opacity: 0.8;
            max-width: 600px; margin-left: auto; margin-right: auto;
        }

        #game-board {
            display: grid;
            gap: 2px;
            background-color: rgba(212, 136, 51, 0.4); 
            border: 2px solid var(--primary);
            margin: 0 auto 30px auto;
            width: max-content;
            box-shadow: 0 0 20px rgba(212, 136, 51, 0.2);
            user-select: none; 
            touch-action: none;
        }

        .cell {
            width: 55px; height: 55px;
            background-color: rgba(26, 18, 12, 0.95);
            position: relative;
            cursor: pointer;
        }

        .dot {
            position: absolute;
            top: 20%; left: 20%; right: 20%; bottom: 20%;
            border-radius: 50%;
            z-index: 10;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 10px currentColor;
        }

        .path-center {
            position: absolute;
            top: 35%; left: 35%; right: 35%; bottom: 35%;
            border-radius: 50%;
            z-index: 5;
        }
        .path-up { position: absolute; top: 0; bottom: 65%; left: 35%; right: 35%; z-index: 5; }
        .path-down { position: absolute; top: 65%; bottom: 0; left: 35%; right: 35%; z-index: 5; }
        .path-left { position: absolute; top: 35%; bottom: 35%; left: 0; right: 65%; z-index: 5; }
        .path-right { position: absolute; top: 35%; bottom: 35%; left: 65%; right: 0; z-index: 5; }

        .grid-glow {
            animation: levelComplete 1s ease;
        }
        @keyframes levelComplete {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 136, 51, 0.2); }
            50% { box-shadow: 0 0 50px #4CAF50; border-color: #4CAF50; }
        }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="game-wrapper" id="main-wrapper">
        <div class="hud">
            <div id="status-display">Stage: 1 / 3</div>
            <div id="score-display">System: <span style="color: var(--danger);">Offline</span></div>
        </div>

        <h2 id="level-title">Energy Grid</h2>
        <p id="grid-instructions">Connect the colored nodes without crossing wires.</p>

        <div id="game-board"></div>

        <div class="controls">
            <button class="btn" id="btn-reset">Reset Wires</button>
            <button class="btn" onclick="window.location.href='index.html?stage=2'">Return to Story</button>
        </div>
    </div>

    <script src="shared.js"></script>

    <script>
        const colors = {
            red: '#ff0000', blue: '#00ccff', green: '#00ff00',
            yellow: '#ffff00', purple: '#9900ff', pink: '#ff00ff', orange: '#ff9900'
        };

        const levels = [
            {
                title: "Stage 1: The Outer Grid",
                size: 6,
                dots: [
                    { c: colors.red, r1: 0, c1: 3, r2: 4, c2: 1 },
                    { c: colors.blue, r1: 1, c1: 5, r2: 2, c2: 4 },
                    { c: colors.yellow, r1: 1, c1: 1, r2: 4, c2: 3 },
                    { c: colors.purple, r1: 1, c1: 2, r2: 3, c2: 3 },
                    { c: colors.pink, r1: 2, c1: 5, r2: 3, c2: 4 },
                    { c: colors.green, r1: 4, c1: 5, r2: 5, c2: 2 }
                ]
            },
            {
                title: "Stage 2: Security Nodes",
                size: 6,
                dots: [
                    { c: colors.yellow, r1: 0, c1: 0, r2: 4, c2: 0 },
                    { c: colors.red, r1: 0, c1: 1, r2: 5, c2: 0 },
                    { c: colors.green, r1: 1, c1: 3, r2: 3, c2: 2 },
                    { c: colors.blue, r1: 0, c1: 5, r2: 3, c2: 3 }
                ]
            },
            {
                title: "Stage 3: The Vault Core",
                size: 7,
                dots: [
                    { c: colors.red, r1: 1, c1: 4, r2: 5, c2: 4 },
                    { c: colors.yellow, r1: 1, c1: 3, r2: 5, c2: 3 },
                    { c: colors.green, r1: 2, c1: 2, r2: 4, c2: 2 },
                    { c: colors.blue, r1: 2, c1: 3, r2: 4, c2: 3 },
                    { c: colors.orange, r1: 1, c1: 5, r2: 5, c2: 5 }
                ]
            }
        ];

        let currentLvl = 0;
        let gridSize = 5;
        let dotsData = [];
        let paths = {}; 
        let activeColor = null;
        let isDragging = false;

        function loadLevel(index) {
            if (index >= levels.length) {
                // THE CRITICAL FIX: Tell index.html we are now on Stage 3 (The End)
                window.location.href = 'index.html?stage=3';
                return;
            }

            let lvl = levels[index];
            gridSize = lvl.size;
            dotsData = lvl.dots;
            paths = {};
            activeColor = null;
            isDragging = false;

            $('#level-title').text(lvl.title);
            $('#status-display').text(`Stage: ${index + 1} / ${levels.length}`);
            $('#score-display').html(`System: <span style="color: var(--danger);">Offline</span>`);

            $('#game-board').css({
                'grid-template-columns': `repeat(${gridSize}, 55px)`,
                'grid-template-rows': `repeat(${gridSize}, 55px)`
            });

            renderBoard();
        }

        function getDotAt(r, c) {
            for (let dot of dotsData) {
                if ((dot.r1 === r && dot.c1 === c) || (dot.r2 === r && dot.c2 === c)) return dot;
            }
            return null;
        }

        function renderBoard() {
            let board = $('#game-board');
            board.empty();
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    let cellDiv = $(`<div class="cell" data-r="${r}" data-c="${c}"></div>`);
                    let dot = getDotAt(r, c);
                    if (dot) cellDiv.append(`<div class="dot" style="background-color: ${dot.c}; color: ${dot.c}"></div>`);
                    for (let color in paths) {
                        let path = paths[color];
                        let pIndex = path.findIndex(p => p.r === r && p.c === c);
                        if (pIndex !== -1) {
                            cellDiv.append(`<div class="path-center" style="background-color: ${color};"></div>`);
                            if (pIndex > 0) {
                                let prev = path[pIndex - 1];
                                if (prev.r < r) cellDiv.append(`<div class="path-up" style="background-color: ${color};"></div>`);
                                if (prev.r > r) cellDiv.append(`<div class="path-down" style="background-color: ${color};"></div>`);
                                if (prev.c < c) cellDiv.append(`<div class="path-left" style="background-color: ${color};"></div>`);
                                if (prev.c > c) cellDiv.append(`<div class="path-right" style="background-color: ${color};"></div>`);
                            }
                            if (pIndex < path.length - 1) {
                                let next = path[pIndex + 1];
                                if (next.r < r) cellDiv.append(`<div class="path-up" style="background-color: ${color};"></div>`);
                                if (next.r > r) cellDiv.append(`<div class="path-down" style="background-color: ${color};"></div>`);
                                if (next.c < c) cellDiv.append(`<div class="path-left" style="background-color: ${color};"></div>`);
                                if (next.c > c) cellDiv.append(`<div class="path-right" style="background-color: ${color};"></div>`);
                            }
                        }
                    }
                    board.append(cellDiv);
                }
            }
        }

        function handleCellDown(r, c) {
            let dot = getDotAt(r, c);
            if (dot) {
                activeColor = dot.c;
                isDragging = true;
                paths[activeColor] = [{r, c}];
                renderBoard();
            } else {
                for (let color in paths) {
                    let idx = paths[color].findIndex(p => p.r === r && p.c === c);
                    if (idx !== -1) {
                        activeColor = color;
                        isDragging = true;
                        paths[color] = paths[color].slice(0, idx + 1); 
                        renderBoard();
                        break;
                    }
                }
            }
        }

        function handleCellEnter(r, c) {
            if (!isDragging || !activeColor) return;
            let path = paths[activeColor];
            let last = path[path.length - 1];
            if (last.r === r && last.c === c) return;
            if (Math.abs(last.r - r) + Math.abs(last.c - c) !== 1) return;
            let dotHere = getDotAt(r, c);
            if (dotHere) {
                if (dotHere.c !== activeColor) return; 
                path.push({r, c});
                activeColor = null; 
                isDragging = false;
                renderBoard();
                checkWin();
                return;
            }
            let ownIdx = path.findIndex(p => p.r === r && p.c === c);
            if (ownIdx !== -1) {
                paths[activeColor] = path.slice(0, ownIdx + 1);
                renderBoard();
                return;
            }
            for (let color in paths) {
                if (color === activeColor) continue;
                let otherIdx = paths[color].findIndex(p => p.r === r && p.c === c);
                if (otherIdx !== -1) paths[color] = paths[color].slice(0, otherIdx); 
            }
            path.push({r, c});
            renderBoard();
        }

        function checkWin() {
            let won = true;
            for (let dot of dotsData) {
                let p = paths[dot.c];
                if (!p || p.length < 2) { won = false; break; }
                let start = p[0], end = p[p.length - 1];
                let match1 = (start.r === dot.r1 && start.c === dot.c1 && end.r === dot.r2 && end.c === dot.c2);
                let match2 = (start.r === dot.r2 && start.c === dot.c2 && end.r === dot.r1 && end.c === dot.c1);
                if (!(match1 || match2)) { won = false; break; }
            }
            if (won) {
                $('#score-display').html(`System: <span style="color: #4CAF50;">Online</span>`);
                $('#game-board').addClass('grid-glow');
                setTimeout(() => {
                    $('#game-board').removeClass('grid-glow');
                    currentLvl++;
                    loadLevel(currentLvl);
                }, 1000);
            }
        }

        $(document).ready(function() {
            loadLevel(currentLvl);
            $('#btn-reset').click(() => { paths = {}; renderBoard(); });
            $(document).on('mousedown', '.cell', function(e) { e.preventDefault(); handleCellDown(parseInt($(this).data('r')), parseInt($(this).data('c'))); });
            $(document).on('mouseenter', '.cell', function() { handleCellEnter(parseInt($(this).data('r')), parseInt($(this).data('c'))); });
            $(document).on('mouseup', function() { isDragging = false; activeColor = null; });
        });
    </script>
</body>
</html>
