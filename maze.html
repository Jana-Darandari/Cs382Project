<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Desert Vault - Memory Sequence</title>
    
    <link rel="stylesheet" href="shared.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        .hud { 
            display: flex; justify-content: space-between; 
            font-size: 18px; font-weight: bold; 
            border-bottom: 1px dashed var(--primary); 
            padding-bottom: 15px; margin-bottom: 20px; 
        }

        #grid-instructions { 
            margin-bottom: 30px; font-style: italic; opacity: 0.8; 
            text-align: center;
        }

        .memory-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px;
            width: max-content;
            margin: 0 auto 40px auto;
        }

        .mem-tile { 
            width: 110px; height: 110px; 
            background: rgba(26, 18, 12, 0.95); 
            border: 2px solid var(--primary); 
            border-radius: 15px; display: flex; 
            justify-content: center; align-items: center; 
            font-size: 55px; cursor: pointer; 
            box-shadow: 0 0 15px rgba(212, 136, 51, 0.2); 
            transition: all 0.15s ease-out; 
            user-select: none;
        }

        /* 6 Distinct Colors for the Flash Animation */
        #tile-0.active { background-color: #d48833; box-shadow: 0 0 50px #d48833; transform: scale(1.1); border-color: #fff; }
        #tile-1.active { background-color: #00ccff; box-shadow: 0 0 50px #00ccff; transform: scale(1.1); border-color: #fff; }
        #tile-2.active { background-color: #4CAF50; box-shadow: 0 0 50px #4CAF50; transform: scale(1.1); border-color: #fff; }
        #tile-3.active { background-color: #ffcc00; box-shadow: 0 0 50px #ffcc00; transform: scale(1.1); border-color: #fff; }
        #tile-4.active { background-color: #ff3333; box-shadow: 0 0 50px #ff3333; transform: scale(1.1); border-color: #fff; }
        #tile-5.active { background-color: #9933cc; box-shadow: 0 0 50px #9933cc; transform: scale(1.1); border-color: #fff; }

        .mem-tile.error { 
            background: var(--danger) !important; 
            border-color: var(--danger) !important; 
            box-shadow: 0 0 50px var(--danger) !important; 
            transform: scale(0.9); animation: shake 0.3s; 
        }

        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-8px); } 
            75% { transform: translateX(8px); } 
        }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="game-wrapper" id="main-wrapper">
        <div class="hud">
            <div id="life-display">Lives: ❤️❤️❤️</div>
            <div id="level-display">Level: 1 / 4</div>
            <div id="score-display">Score: 0</div>
        </div>
        
        <div id="sys-display" style="text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 20px;">
            Initializing Sequence...
        </div>

        <h2 id="level-title" style="text-align: center;">The Lost Dallah Cipher</h2>
        <p id="grid-instructions">Memorize the glowing heritage symbols. <span style="color: #ffd280;">The sequence gets longer and faster!</span></p>

        <div class="memory-board">
            <div class="mem-tile" id="tile-0" data-id="0">🏺</div>
            <div class="mem-tile" id="tile-1" data-id="1">🐪</div>
            <div class="mem-tile" id="tile-2" data-id="2">🌴</div>
            <div class="mem-tile" id="tile-3" data-id="3">🌙</div>
            <div class="mem-tile" id="tile-4" data-id="4">☀️</div>
            <div class="mem-tile" id="tile-5" data-id="5">🗡️</div>
        </div>

        <div class="controls" style="display: flex; justify-content: center; gap: 15px;">
            <button class="btn" onclick="location.reload()">Restart Protocol</button>
            <button class="btn" id="btn-return">Return to Hub</button>
        </div>
    </div>

    <script src="shared.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let playerName = urlParams.get('name') || 'Operator';
        let currentScore = parseInt(urlParams.get('score')) || 0; 
        
        $('#score-display').text(`Score: ${currentScore}`);
        
        $('#btn-return').click(() => {
            window.location.href = `index.html?name=${encodeURIComponent(playerName)}&score=${currentScore}`;
        });

        let sequence = [];
        let playerStep = 0;
        let level = 1;
        const maxLevel = 4; // Max level set to 4!
        let hearts = 3;
        
        let isWatching = true; 
        let isDead = false;

        $(document).ready(function() {
            setTimeout(startLevel, 1000);
        });

        function startLevel() {
            isWatching = true;
            playerStep = 0;
            
            // DIFFICULTY SCALING: Add 3 items on Level 1, and 2 items on every level after!
            let itemsToAdd = (level === 1) ? 3 : 2;
            for(let i = 0; i < itemsToAdd; i++) {
                sequence.push(Math.floor(Math.random() * 6)); 
            }
            
            $('#level-display').text(`Level: ${level} / ${maxLevel}`);
            $('#sys-display').html(`Memorize ${sequence.length} Symbols... <span style="color: #ffd280;">(Watch)</span>`);
            
            setTimeout(playSequence, 1000);
        }

        function playSequence() {
            // SPEED SCALING: Gets faster as the level increases
            let speed = 900 - (level * 100); 
            let flashDuration = speed * 0.6; 
            
            let i = 0;
            let interval = setInterval(() => {
                flashTile(sequence[i], flashDuration);
                i++;
                
                if (i >= sequence.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        isWatching = false;
                        $('#sys-display').html(`System Ready. <span style="color: #4CAF50;">(Your Turn)</span>`);
                    }, speed);
                }
            }, speed); 
        }

        function flashTile(id, duration) {
            let tile = $(`#tile-${id}`);
            tile.addClass('active');
            
            setTimeout(() => {
                tile.removeClass('active');
            }, duration); 
        }

        // Player Click Logic
        $('.mem-tile').click(function() {
            if (isWatching || isDead) return;
            
            let id = parseInt($(this).data('id'));
            flashTile(id, 300); 

            // Check if click matches the current step in the sequence
            if (id === sequence[playerStep]) {
                playerStep++;
                
                // If you finished the sequence for this level
                if (playerStep === sequence.length) {
                    isWatching = true;
                    currentScore += (100 * level); 
                    $('#score-display').text(`Score: ${currentScore}`);
                    
                    if (level === maxLevel) {
                        $('#sys-display').html(`<span style="color: #4CAF50;">Cipher Broken! Vault Accessed.</span>`);
                        setTimeout(() => {
                            window.location.href = `index.html?name=${encodeURIComponent(playerName)}&score=${currentScore}`;
                        }, 1500);
                    } else {
                        level++;
                        $('#sys-display').html(`<span style="color: #4CAF50;">Match! Generating Next Tier...</span>`);
                        setTimeout(startLevel, 1500);
                    }
                }
            } else {
                // WRONG CLICK
                isWatching = true;
                hearts--;
                currentScore = Math.max(0, currentScore - 50); 
                
                $('#score-display').text(`Score: ${currentScore}`);
                $('#life-display').text("Lives: " + "❤️".repeat(hearts));
                
                $(this).addClass('error');
                setTimeout(() => $(this).removeClass('error'), 500);
                
                if (hearts <= 0) {
                    isDead = true;
                    // FAIL STATE: Trigger the red lockout screen on the Hub
                    setTimeout(() => {
                        window.location.href = `index.html?stage=fail&name=${encodeURIComponent(playerName)}&score=${currentScore}`;
                    }, 1000);
                } else {
                    $('#sys-display').html(`<span style="color: var(--danger);">Error! Replaying Sequence...</span>`);
                    setTimeout(() => {
                        playerStep = 0; 
                        playSequence();
                    }, 1500);
                }
            }
        });
    </script>
</body>
</html>
