<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Desert Cipher</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        :root {
            --primary: #d48833; 
            --bg-color: #1a120c; 
            --glow: 0 0 15px rgba(212, 136, 51, 0.6);
            --danger: #cc3333;
        }

        body, .slot, .letter-btn, .controls { display: flex; align-items: center; justify-content: center; }

        body {
            background: var(--bg-color) url('desert_bg.png') center/cover no-repeat;
            color: var(--primary);
            font-family: 'Courier Prime', monospace;
            height: 100vh; margin: 0; overflow: hidden;
        }

        #dust-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }

        .game-wrapper {
            border: 2px solid var(--primary); border-radius: 12px;
            width: 700px; min-height: 500px; padding: 40px;
            position: relative; z-index: 10;
            box-shadow: var(--glow), inset 0 0 40px rgba(212, 136, 51, 0.1);
            background-color: rgba(26, 18, 12, 0.75); backdrop-filter: blur(6px);
            text-align: center;
        }

        .hud {
            display: flex; justify-content: space-between;
            font-size: 18px; font-weight: bold;
            border-bottom: 1px dashed var(--primary);
            padding-bottom: 15px; margin-bottom: 25px;
        }

        h2 { text-transform: uppercase; letter-spacing: 3px; font-size: 28px; margin-bottom: 10px; }

        .riddle-box {
            background: rgba(212, 136, 51, 0.05); padding: 20px; border-radius: 8px;
            border-left: 4px solid var(--primary); font-size: 18px; line-height: 1.5; margin-bottom: 30px; font-style: italic;
        }

        .letter-slots, .letters-pool { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }

        .slot {
            width: 50px; height: 50px; border-bottom: 2px solid var(--primary);
            font-size: 30px; font-weight: bold; text-transform: uppercase;
            color: #fff; text-shadow: 0 0 10px var(--primary); transition: all 0.2s; position: relative;
        }
        
        .slot:empty::after { content: '✨'; position: absolute; font-size: 16px; opacity: 0.1; }
        .slot.error { border-color: var(--danger); color: var(--danger); animation: shake 0.4s; }
        .slot.active { border-color: #fff; box-shadow: 0 10px 10px -10px #fff; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .letter-btn {
            width: 50px; height: 50px; border: 1px solid var(--primary);
            background: rgba(26, 18, 12, 0.8); color: var(--primary);
            font-size: 24px; cursor: pointer; font-family: inherit; border-radius: 4px;
            transition: all 0.2s; text-transform: uppercase;
        }
        .letter-btn:hover { background: rgba(212, 136, 51, 0.2); transform: scale(1.1); box-shadow: var(--glow); }
        .letter-btn.used { opacity: 0; pointer-events: none; transform: scale(0); }

        .controls { gap: 15px; }
        .btn {
            background: transparent; color: var(--primary); border: 1px solid var(--primary);
            padding: 10px 20px; font-family: inherit; font-size: 14px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; border-radius: 4px;
        }
        .btn:hover { background: var(--primary); color: #1a120c; box-shadow: var(--glow); }
        .btn-hint { border-color: #ffd280; color: #ffd280; }
        .btn-hint:disabled { opacity: 0.3; cursor: not-allowed; border-color: #444; color: #444; }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="game-wrapper">
        <div class="hud">
            <div id="life-display">Lives: ❤️❤️❤️</div>
            <div id="hint-display">Hints: ✨✨✨</div>
        </div>

        <h2>The Cipher</h2>
        <div class="riddle-box" id="riddle-text">Loading riddle...</div>
        <div class="letter-slots" id="word-slots"></div>
        <div class="letters-pool" id="letter-pool"></div>

        <div class="controls">
            <button class="btn" id="btn-backspace">Backspace</button>
            <button class="btn btn-hint" id="btn-hint">Use Hint</button>
        </div>
    </div>

    <script>
        const gameLevels = [
            { riddle: "I am the ship of the desert, bearing burdens across the golden sands.", answer: "CAMEL", decoys: "ZXQ" },
            { riddle: "I drop from the sky but never break. I bring life to the dry earth.", answer: "RAIN", decoys: "BKM" },
            { riddle: "I have no single home but the endless horizon, wandering beneath the sun.", answer: "NOMAD", decoys: "CHYT" },
            { riddle: "The hunter of the sky, with eyes that pierce the desert sun.", answer: "FALCON", decoys: "JPRT" }
        ];

        let level = 0, hearts = 3, hints = 3, guess = "", answer = "";

        $(document).ready(function() {
            loadLevel(level);

            $(document).on('click', '.letter-btn:not(.used)', function() {
                if(guess.length >= answer.length) return;
                $(this).addClass('used');
                guess += $(this).text();
                updateUI();
            });

            $(document).keydown(e => {
                if(e.key === "Backspace") $('#btn-backspace').click();
                else if (/^[a-zA-Z]$/.test(e.key)) {
                    $(`.letter-btn:not(.used)`).filter(function() { return $(this).text() === e.key.toUpperCase(); }).first().click();
                }
            });

            $('#btn-backspace').click(() => {
                if(guess.length) {
                    let lastChar = guess.slice(-1);
                    guess = guess.slice(0, -1);
                    $(`.letter-btn.used`).filter(function() { return $(this).text() === lastChar; }).last().removeClass('used');
                    updateUI();
                }
            });

            $('#btn-hint').click(() => {
                if(hints > 0 && guess.length < answer.length) {
                    hints--;
                    updateHUD();
                    let nextCorrectLetter = answer[guess.length];
                    $(`.letter-btn:not(.used):contains(${nextCorrectLetter})`).first().click();
                    if(hints === 0) $('#btn-hint').prop('disabled', true);
                }
            });
        });

        function loadLevel(idx) {
            if(idx >= gameLevels.length) {
                window.location.href = 'index.html?stage=2';
                return;
            }
            let data = gameLevels[idx];
            answer = data.answer; guess = "";
            
            $('#riddle-text').text(`"${data.riddle}"`);
            
            $('#word-slots').empty();
            for(let i=0; i<answer.length; i++) $('#word-slots').append(`<div class="slot" id="slot-${i}"></div>`);
            
            let pool = (answer + data.decoys).split('').sort(() => Math.random() - 0.5);
            $('#letter-pool').empty();
            pool.forEach(l => $('#letter-pool').append(`<button class="letter-btn">${l}</button>`));
            
            updateUI();
        }

        function updateUI() {
            $('.slot').text('').removeClass('error active');
            for(let i=0; i<answer.length; i++) {
                if (i < guess.length) $(`#slot-${i}`).text(guess[i]);
                else if (i === guess.length) $(`#slot-${i}`).addClass('active');
            }
            if(guess.length === answer.length) checkWin();
        }

        function checkWin() {
            if(guess === answer) {
                $('.slot').css({'border-color': '#4CAF50', 'color': '#4CAF50'});
                setTimeout(() => loadLevel(++level), 1000);
            } else {
                $('.slot').addClass('error');
                hearts--;
                updateHUD();
                
                if(hearts <= 0) {
                    setTimeout(() => {
                        alert("TERMINAL LOCKED: Security breach detected. Restarting system...");
                        location.reload(); 
                    }, 500);
                } else {
                    setTimeout(() => { while(guess.length) $('#btn-backspace').click(); }, 800);
                }
            }
        }

        function updateHUD() {
            let heartIcons = "❤️".repeat(hearts) + "🖤".repeat(3 - hearts);
            let hintIcons = "✨".repeat(hints) + "🔘".repeat(3 - hints);
            $('#life-display').text("Lives: " + heartIcons);
            $('#hint-display').text("Hints: " + hintIcons);
        }

        /* Dust Engine */
        const cvs = document.getElementById('dust-canvas'), ctx = cvs.getContext('2d');
        let parts = [];
        function resize() { cvs.width = window.innerWidth; cvs.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Dust {
            constructor() { this.reset(true); }
            reset(rx=false) { this.x=rx?Math.random()*cvs.width:0; this.y=Math.random()*cvs.height; this.s=Math.random()*2+0.5; this.sx=Math.random()*2+0.5; this.sy=(Math.random()-0.5); this.a=Math.random()*0.4+0.1; }
            update() { this.x+=this.sx; this.y+=this.sy; if(this.x>cvs.width||this.y>cvs.height||this.y<0) this.reset(); }
            draw() { ctx.fillStyle=`rgba(212,136,51,${this.a})`; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); }
        }
        for(let i=0; i<100; i++) parts.push(new Dust());
        function anim() { ctx.clearRect(0,0,cvs.width,cvs.height); parts.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(anim); }
        anim();
    </script>
</body>
</html>
