<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Desert Vault - Story</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="shared.css">

    <style>
        .dialogue-container {
            position: relative; width: 600px; min-height: 120px;
            background: rgba(26, 18, 12, 0.95); border: 2px solid var(--primary);
            border-radius: 20px; box-shadow: var(--glow); padding: 30px;
            margin-top: 50px; z-index: 10; cursor: pointer; backdrop-filter: blur(5px);
            margin-left: 200px; transition: all 0.3s;
        }

        .dialogue-container:hover { box-shadow: 0 0 30px rgba(212, 136, 51, 0.4); transform: scale(1.02); }

        .dialogue-container::before {
            content: ''; position: absolute; left: -20px; top: 50px;
            border-width: 15px 20px 15px 0; border-style: solid;
            border-color: transparent var(--primary) transparent transparent;
        }
        .dialogue-container::after {
            content: ''; position: absolute; left: -16px; top: 52px;
            border-width: 13px 18px 13px 0; border-style: solid;
            border-color: transparent rgba(26, 18, 12, 0.95) transparent transparent;
        }

        .dialogue-text { font-size: 22px; line-height: 1.6; text-shadow: 0 0 5px var(--primary); min-height: 70px; }

        .click-indicator {
            position: absolute; bottom: 10px; right: 20px;
            font-size: 14px; opacity: 0.5; animation: blink 1s infinite alternate;
        }
        @keyframes blink { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }

        .action-btn { display: none; margin-top: 20px; width: 100%; font-size: 18px; }

        .inventory-wrapper { position: fixed; bottom: 40px; display: flex; flex-direction: column; align-items: center; z-index: 10; }

        .inventory {
            display: flex; gap: 30px; padding: 20px 40px; 
            background: rgba(0,0,0,0.8); border: 1px dashed var(--primary); 
            border-radius: 12px; box-shadow: var(--glow);
        }
        
        .inv-item { font-size: 45px; opacity: 0.2; transition: 0.5s; filter: grayscale(100%); position: relative; }
        
        .inv-item.collected { opacity: 1; filter: grayscale(0%); transform: scale(1.1); }
        .inv-item.collected::after {
            content: '✨'; position: absolute; top: -10px; right: -10px; 
            font-size: 20px; text-shadow: none; animation: float 2s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="dialogue-container" id="dialogue-box">
        <div class="dialogue-text" id="text-display">...</div>
        <div class="click-indicator">Click to continue ▼</div>
        <button class="btn action-btn" id="launch-btn"></button>
    </div>

    <div class="inventory-wrapper">
        <p style="font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; opacity: 0.8;">Artifacts</p>
        <div class="inventory">
            <div class="inv-item" id="inv-map" title="Ancient Map">🗺️</div>
            <div class="inv-item" id="inv-key" title="Vault Key">🗝️</div>
            <div class="inv-item" id="inv-diamond" title="The Desert Gem">💎</div>
        </div>
        <button class="btn" style="margin-top: 20px; font-size: 10px; padding: 5px 10px;" onclick="window.location.href='index.html'">Restart Story</button>
    </div>

    <script src="shared.js"></script>

    <script>
        // Check the URL for the current stage (e.g., index.html?stage=2)
        const urlParams = new URLSearchParams(window.location.search);
        let currentStage = urlParams.get('stage') || '1'; 

        let storyLines = [];
        let nextAction = {};

        // Set the story based on the URL parameter
        if (currentStage === '1') {
            storyLines = [
                "I finally made it inside the tent.",
                "The laser grid is active. One wrong move and the alarms will trigger.",
                "There's a terminal over there. I need to decrypt its cipher to get the map."
            ];
            nextAction = { text: "Access Terminal", url: "cipher.html" };
        
        } else if (currentStage === '2') {
            $('#inv-map').addClass('collected'); // Map is collected!
            storyLines = [
                "Got it. The map coordinates are locked in.",
                "They point directly to the main vault doors...",
                "...but the power grid is completely scrambled.",
                "I need to reroute the colored energy nodes without crossing the wires to restore power."
            ];
            nextAction = { text: "Access Power Grid", url: "maze.html" };

        } else if (currentStage === '3') {
            $('#inv-map').addClass('collected');
            $('#inv-key').addClass('collected'); // Power restored!
            setTimeout(() => $('#inv-diamond').addClass('collected'), 1000); // Diamond get!

            storyLines = [
                "The power grid is online. The heavy stone doors are opening.",
                "There it is. The Desert Gem.",
                "The secrets of the sands are finally mine."
            ];
            nextAction = { text: "Mission Accomplished", url: "#" };
        }

        // Dialogue Typing Logic
        let currentLine = 0;
        let isTyping = false;

        function typeText(text) {
            isTyping = true;
            $('#text-display').empty();
            let i = 0;
            let timer = setInterval(function() {
                if (i < text.length) {
                    $('#text-display').append(text.charAt(i));
                    i++;
                } else {
                    clearInterval(timer);
                    isTyping = false;
                }
            }, 35); 
        }

        $(document).ready(function() { typeText(storyLines[0]); });

        $('#dialogue-box').click(function() {
            if (isTyping) return; 

            currentLine++;
            if (currentLine < storyLines.length) {
                typeText(storyLines[currentLine]);
            } else {
                $('.click-indicator').hide();
                $('#text-display').css('min-height', 'auto');
                
                let btn = $('#launch-btn');
                btn.text(nextAction.text).show();
                
                btn.off('click').click(function(e) {
                    e.stopPropagation(); 
                    if (nextAction.url !== "#") {
                        window.location.href = nextAction.url;
                    }
                });
            }
        });
    </script>
</body>
</html>
